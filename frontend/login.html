<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESP32 Login</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body { justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;}
        .login-box { background: #1e1e1e; padding: 40px; border-radius: 8px; border: 1px solid #333; text-align: center; width: 100%; max-width: 350px; box-sizing: border-box;}
        .login-box h1 { margin-top: 0; color: #fff; font-size: 24px; margin-bottom: 20px;}
        .login-box input { margin-bottom: 15px; }
        .login-box button { width: 100%; font-size: 16px; margin-top: 10px;}
    </style>
</head>
<body>
<div class="login-box">
    <h1>ESP32 LOGIN</h1>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button class="success" onclick="login()">Entrar</button>
    <p id="msg" style="margin-top: 15px; font-size: 14px;"></p>
</div>
<script src="/script.js"></script>
</body>
</html>
